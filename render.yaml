services:
  - type: web
    name: quant-dashboard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        value: ""
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
    healthCheckPath: /docs
